services:
  web:
    image: ditinno4007.azurecr.io/sap-so-to-netsuite:1.1
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./temp:/app/temp
    depends_on:
      - db

  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-init1234}
      MYSQL_DATABASE: ${DB_NAME:-sap_so_to_netsuite}
    expose:
      - "3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
